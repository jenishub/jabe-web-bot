{% extends "base.html" %}
{% block content %}
<div class="step-indicator">Step 9 of 10</div>
<h2>Tours</h2>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="POST">
  {% for d in range(1, days + 1) %}
  <label>Day {{ d }}</label>
  <select name="tour_{{ d }}" required>
    <option value="">— Select tour —</option>
    {% for t in tours_by_day[d] %}
    <option value="{{ t }}">{{ t }}</option>
    {% endfor %}
  </select>
  {% endfor %}
  <button class="btn" type="submit">Next →</button>
</form>
{% endblock %}
