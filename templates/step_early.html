{% extends "base.html" %}
{% block content %}
<div class="step-indicator">Step 8 of 10</div>
<h2>Early Check-in (Almaty)</h2>
<p class="hint" style="margin-bottom:16px">Adds 1 extra night to the Almaty hotel cost.</p>
<form method="POST">
  <div class="radio-group">
    <label><input type="radio" name="early" value="yes" required> ✅ Yes — include early check-in</label>
    <label><input type="radio" name="early" value="no"> ❌ No</label>
  </div>
  <button class="btn" type="submit">Next →</button>
</form>
{% endblock %}
